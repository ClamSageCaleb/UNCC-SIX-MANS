<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Norm Admin Console</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
  <link rel="stylesheet" href="styles.css">
  <script src="/eel.js"></script>
  <script src="main.js"></script>
</head>

<body>
  <header>
    <button onclick="getAllData()" id="refresh">Refresh</button>
  </header>

  <main>
    <section id="current-queue">
      <div class="queue-content">
        <div class="card">
          <h2>Current Queue</h2>
          <div id="curr-queue-content" class="card-content"></div>
          <div>
            <button onclick="removePlayersFromQueue()">Remove Selected</button>
            <button onclick="clearCurrentQueue()">Clear Queue</button>
          </div>
        </div>
        <div class="card">
          <h2>Reserve Players</h2>
          <div id="reserve-players" class="card-content"></div>
          <div>
            <button onclick="addReservesToQueue()">Add Selected</button>
            <button onclick="showNewReserveModal()">Add New Reserve</button>
          </div>
        </div>
      </div>
    </section>


    <section id="active-matches">
      <h2>Active Matches</h2>
      <div class="matches-content"></div>
    </section>


    <section id="leaderboard">
      <h2>Leaderboard</h2>
      <div class="content">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Wins</th>
              <th>Losses</th>
              <th>Matches Played</th>
              <th>Win Perc.</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </section>

    <section id="config">
      <div class="config-header">
        <h2>Config</h2>
        <div>
          <input type="checkbox" id="plainText" />
          <label for="plainText">Show Hidden Fields</label>
        </div>
      </div>
      <div class="config-content">
        <form id="config-form" class="config">
          <div>
            <label for="awsId">AWS ID</label>
            <input type="password" id="awsId" name="awsId">
          </div>
          <div>
            <label for="awsKey">AWS Secret Key</label>
            <input type="password" id="awsKey" name="awsKey">
          </div>
          <div>
            <label for="discordBotKey">Discord Bot Key</label>
            <input type="password" id="discordBotKey" name="discordBotKey">
          </div>
          <button type="submit">Save Changes</button>
        </form>
      </div>
    </section>
  </main>

  <div id="addReserveModal" class="modal" style="display: none;">
    <button onclick="closeNewReserveModal()" class="closeBtn">&#10006;</button>
    <div class="dialog-container">
      <form id="new-reserve-form">
        <div>
          <label for="playerId">Player ID</label>
          <input type="text" id="playerId" name="playerId">
        </div>
        <div>
          <label for="playerName">Player Name</label>
          <input type="text" id="playerName" name="playerName">
        </div>
        <button type="submit">Add Reserve</button>
      </form>
    </div>
  </div>
</body>

</html>
